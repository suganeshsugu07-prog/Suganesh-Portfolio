  <style>
    /* ── Social Media Posters Gallery ── */
    .sm-gallery-section {
      padding: 80px 0 120px;
    }

    .sm-gallery-header {
      text-align: center;
      margin-bottom: 60px;
      padding: 0 24px;
    }

    .sm-gallery-label {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #FF7A00;
      margin-bottom: 16px;
    }

    .sm-gallery-title {
      font-family: 'Clash Display', 'Inter', sans-serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    /* 3-column grid on desktop, 1-column on mobile */
    .sm-poster-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 0 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .sm-poster-item {
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: #111;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.35s ease;
    }

    .sm-poster-item:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.6),
        0 0 30px rgba(255, 122, 0, 0.12);
    }

    .sm-poster-item img {
      display: block;
      width: 100%;
      height: auto; /* natural aspect ratio preserved */
      object-fit: unset;
      transition: transform 0.5s ease;
    }

    .sm-poster-item:hover img {
      transform: scale(1.03);
    }

    /* Subtle orange glow border on hover */
    .sm-poster-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 1px solid rgba(255, 122, 0, 0);
      transition: border-color 0.35s ease;
      pointer-events: none;
    }

    .sm-poster-item:hover::after {
      border-color: rgba(255, 122, 0, 0.35);
    }

    /* Mobile: 3 columns same as desktop */
    @media (max-width: 900px) {
      .sm-poster-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 0 12px;
      }

      .sm-gallery-section {
        padding: 60px 0 80px;
      }

      .sm-gallery-header {
        margin-bottom: 40px;
      }
    }

    /* Reveal animation */
    .sm-poster-item {
      opacity: 0;
      transform: translateY(30px);
      transition:
        opacity 0.55s ease,
        transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.35s ease;
    }

    .sm-poster-item.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .sm-poster-item.revealed:hover {
      transform: translateY(-6px) scale(1.01);
    }
  </style>

  <script>
    document.fonts.ready.then(() => {
      document.documentElement.classList.add('fonts-loaded');
    });

    document.addEventListener('DOMContentLoaded', () => {
      // Lightbox logic
      const lightbox = document.getElementById('detail-lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxCaption = document.getElementById('lightbox-caption');
      const closeBtn = document.getElementById('lightbox-close-btn');

      document.querySelectorAll('.sm-poster-item').forEach(card => {
        card.addEventListener('click', () => {
          const img = card.querySelector('img');
          if (img) {
            lightboxImg.src = img.src;
            lightboxCaption.textContent = img.alt || '';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
          }
        });
      });

      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target.classList.contains('lightbox-content-wrap')) {
          closeLightbox();
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && lightbox.classList.contains('active')) {
          closeLightbox();
        }
      });

      // Staggered reveal on scroll
      const revealObs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            revealObs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.sm-poster-item').forEach((el, index) => {
        el.style.transitionDelay = `${(index % 3) * 0.12}s`;
        revealObs.observe(el);
      });
    });
  </script>
